<!--
  VOGELRADAR — map-first dashboard for recent rare bird sightings (waarneming.nl).

  ====== GOING LIVE ======
  Paste your hosted JSON URL into CONFIG.DATA_URL below. The host must send a CORS header
  (Access-Control-Allow-Origin: *). Leave it empty to use the built-in demo data.

  TWO FETCH MODES:
   1) STATIC  -> a plain URL. App fetches once, uses GPS only to sort/filter on the device.
                 e.g. "https://your-host/birds.json"
   2) BY GPS  -> a URL containing {lat} {lng} {radius}. App fills these from the user's GPS
                 before fetching, and refetches when the location updates.
                 e.g. "https://your-host/birds?lat={lat}&lng={lng}&radius={radius}"
                 {radius} is filled from CONFIG.FETCH_RADIUS_KM (in km).

  ====== EXPECTED JSON SHAPE (what your hourly scraper should output) ======
  {
    "lastUpdated": "2026-06-18T14:00:00Z",
    "sightings": [
      {
        "id": "284913201",
        "nl": "Roze Spreeuw", "en": "Rosy Starling", "sci": "Pastor roseus",
        "rarity": "very_rare",                    // common | uncommon | rare | very_rare
        "count": 1, "lat": 51.954, "lng": 5.628,
        "loc": "Blauwe Kamer, Wageningen",
        "date": "2026-06-17", "time": "08:32", "photo": true,
        "url": "https://waarneming.nl/observation/284913201/"
      }
    ]
  }
  zeldzaamheid mapping: Algemeen->common, Vrij zeldzaam->uncommon, Zeldzaam->rare, Zeer zeldzaam->very_rare.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vogelradar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --line:#e7ecf1; --brand:#0d9488; --brand-d:#0f766e;
    --c-common:#94a3b8; --c-uncommon:#0ea5e9; --c-rare:#f59e0b; --c-very_rare:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased}

  /* Full-screen map */
  #map{position:fixed;inset:0;z-index:0;background:#cddfea}   /* sea colour */
  .leaflet-bottom.leaflet-right{bottom:4px;right:4px}
  .leaflet-control-attribution{font-size:8px;background:rgba(255,255,255,.55);padding:1px 4px;border-radius:3px;backdrop-filter:blur(4px)}
  .leaflet-popup-content{margin:10px 12px;font-family:inherit}
  .pop .pnl{font-weight:730;font-size:14px}
  .pop .pen{color:#64748b;font-size:11.5px;margin:1px 0 4px}
  .pop .pmeta{font-size:12px;color:#0f172a;line-height:1.5}
  .pop a{color:var(--brand-d);font-weight:650;font-size:12px;text-decoration:none}

  /* Markers */
  .mk{display:block;border-radius:50%;background:var(--c);border:2px solid #fff;box-shadow:0 1px 5px rgba(2,6,23,.4)}
  .mk-pulse{animation:pulse 1.9s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.55)}70%{box-shadow:0 0 0 14px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
  .mk-sel{box-shadow:0 0 0 4px rgba(13,148,136,.9),0 2px 8px rgba(2,6,23,.45);border-width:3px}
  .me{display:block;width:14px;height:14px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 6px rgba(37,99,235,.2)}

  /* Floating top bar */
  .topbar{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:min(100vw - 16px,600px);z-index:1000;
    background:rgba(255,255,255,.84);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.7);border-radius:16px;box-shadow:0 6px 22px rgba(2,6,23,.12);padding:8px 10px}
  .brandrow{display:flex;align-items:center;gap:9px}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-d));
    display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .bt b{font-size:16px;font-weight:760;letter-spacing:-.3px;display:block;line-height:1.1}
  .bt span{font-size:10.5px;color:var(--muted)}
  .grow{flex:1}
  .loc{display:inline-flex;align-items:center;gap:5px;border:1px solid #cde8e3;background:#e8f3f1;color:var(--brand-d);
    font-weight:650;font-size:11.5px;padding:6px 9px;border-radius:999px;cursor:pointer;max-width:150px}
  .loc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rf{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:14px;cursor:pointer;color:var(--ink);flex:0 0 auto}
  .rf:active,.loc:active{transform:scale(.94)}
  .spin{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .chips{display:flex;gap:6px;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;flex:0 0 auto;
    border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:650;color:var(--muted);cursor:pointer;user-select:none}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--pc)}
  .chip .ck{width:12px;height:12px;display:none;color:#fff}
  .chip .n{font-size:10.5px;font-weight:750;opacity:.85}
  .chip.on{color:#fff;background:var(--pc);border-color:var(--pc)}
  .chip.on .dot{background:#fff}.chip.on .ck{display:block}
  .chip:active{transform:scale(.95)}

  /* Bottom sheet */
  .sheet{position:fixed;left:50%;bottom:0;width:min(100vw,600px);height:74vh;z-index:1100;
    background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -10px 34px rgba(2,6,23,.18);
    display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.32,.72,0,1)}
  .handle{padding:9px 0 6px;display:flex;justify-content:center;cursor:grab;flex:0 0 auto;touch-action:none}
  .grab{width:40px;height:5px;border-radius:999px;background:#cbd5e1}
  .sheethead{padding:2px 16px 10px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .summary{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .summary .big{font-size:15px;font-weight:740;letter-spacing:-.2px}
  .summary .sm{font-size:11px;color:var(--muted)}
  .filters{display:flex;gap:8px;margin-top:9px;align-items:center}
  .seg{display:inline-flex;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{border:0;background:transparent;padding:6px 12px;font-size:12.5px;font-weight:680;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand);color:#fff}
  select{border:1.5px solid var(--line);border-radius:9px;background:#fff;padding:6px 9px;font-size:12.5px;font-weight:650;
    color:var(--ink);font-family:inherit;-webkit-appearance:none;appearance:none;cursor:pointer}
  .hint{font-size:10.5px;color:var(--muted);margin-left:auto}

  .cards{flex:1;overflow-y:auto;padding:10px 12px 30px;-webkit-overflow-scrolling:touch;touch-action:pan-y}
  .card{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-left-width:5px;
    border-radius:13px;padding:10px 11px;margin-bottom:8px;cursor:pointer;transition:background .12s,border-color .12s}
  .card:active{background:#f8fafc}
  .card.sel{background:#f0fdfa;border-color:var(--brand)}
  .cbody{flex:1;min-width:0}
  .cname{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .cname b{font-size:15px;font-weight:730;letter-spacing:-.2px}
  .cname .en{font-size:11.5px;color:var(--muted)}
  .cmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;font-size:11.5px;color:var(--muted)}
  .cmeta .w{color:var(--ink);font-weight:600}
  .mega{font-size:9.5px;font-weight:800;color:#fff;background:var(--c-very_rare);padding:1.5px 6px;border-radius:999px;letter-spacing:.3px}
  .rar{font-size:9.5px;font-weight:800;color:#fff;background:var(--c-rare);padding:1.5px 6px;border-radius:999px;letter-spacing:.3px}
  .ph{font-size:11px}
  .cright{display:flex;flex-direction:column;align-items:flex-end;flex:0 0 auto}
  .cdist{font-size:15.5px;font-weight:780;letter-spacing:-.3px;white-space:nowrap}
  .cdist small{display:block;text-align:right;font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:0}
  .near{font-size:9.5px;font-weight:750;color:#166534;background:#dcfce7;border:1px solid #bbf7d0;padding:1px 6px;border-radius:999px;margin-top:3px}

  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .empty .e{font-size:32px;margin-bottom:6px}
  .empty p{font-size:13px;margin:3px 0}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="brandrow">
    <div class="logo">🦅</div>
    <div class="bt"><b>Vogelradar</b><span id="sub">zeldzame vogels bij jou</span></div>
    <div class="grow"></div>
    <button class="loc" id="loc">📍 <span id="locname">locatie bepalen…</span></button>
    <button class="rf" id="refresh" title="Verversen">⟳</button>
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="sheet" id="sheet">
  <div class="handle" id="handle"><span class="grab"></span></div>
  <div class="sheethead">
    <div class="summary">
      <span class="big" id="sumbig">…</span>
      <span class="sm">dichtste eerst</span>
    </div>
    <div class="filters">
      <div class="seg" id="win">
        <button data-w="3" class="on">3 dagen</button>
        <button data-w="7">7 dagen</button>
      </div>
      <select id="dist">
        <option value="0">Alle afstanden</option>
        <option value="10">≤ 10 km</option>
        <option value="25">≤ 25 km</option>
        <option value="50">≤ 50 km</option>
      </select>
      <span class="hint" id="hint"></span>
    </div>
  </div>
  <div class="cards" id="cards"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ===== CONFIG ===== */
const CONFIG = {
  DATA_URL: "/birds.json",                       // plain URL = static; URL with {lat}{lng}{radius} = fetch by GPS. Empty = demo.
  FETCH_RADIUS_KM: 50,                           // fills {radius} in a by-GPS URL
  DEFAULT_LOC: { lat: 52.12, lng: 5.29, name: "midden van NL" },
  AUTO_REFRESH_MIN: 15
};
const LOC_QUERY = /\{lat\}/.test(CONFIG.DATA_URL);   // does the URL want GPS coordinates?
const RARITY = {
  common:    { label:"Algemeen",     hex:"#94a3b8", o:0 },
  uncommon:  { label:"Vrij zeldzaam",hex:"#0ea5e9", o:1 },
  rare:      { label:"Zeldzaam",     hex:"#f59e0b", o:2 },

/* ===== STATE ===== */
const state = {
  active: new Set(["rare","very_rare"]),
  win: 3, maxDist: 0,
  user: { ...CONFIG.DEFAULT_LOC, precise:false },
  data: [], lastUpdated: null, isDemo: false, selected: null
};

/* ===== DEMO DATA (daysAgo -> real date at load) ===== */

  {id:"284100789",nl:"Amerikaanse Goudplevier",en:"American Golden Plover",sci:"Pluvialis dominica",rarity:"very_rare",count:1,lat:53.052,lng:4.792,loc:"De Cocksdorp, Texel",daysAgo:5,time:"16:20",photo:true},

/* ===== HELPERS ===== */
const $ = s => document.querySelector(s);
function dateFromDaysAgo(d){ const t=new Date(); t.setHours(8,0,0,0); t.setDate(t.getDate()-d); return t.toISOString().slice(0,10); }
function daysAgo(s){ const d=new Date(s.date+"T00:00:00"); const n=new Date(); n.setHours(0,0,0,0); return Math.round((n-d)/864e5); }
function haversine(a,b){ const R=6371,r=x=>x*Math.PI/180; const dLa=r(b.lat-a.lat),dLn=r(b.lng-a.lng);
  const x=Math.sin(dLa/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLn/2)**2; return 2*R*Math.asin(Math.sqrt(x)); }
function fmtDist(km){ if(km<1) return Math.round(km*1000)+" m"; if(km<10) return km.toFixed(1)+" km"; return Math.round(km)+" km"; }
function ago(s){ const d=daysAgo(s),t=s.time?" · "+s.time:""; if(d<=0)return"vandaag"+t; if(d===1)return"gisteren"+t; return d+" dagen geleden"; }
function obsUrl(s){ return s.url||("https://waarneming.nl/observation/"+s.id+"/"); }
function mapsUrl(s){ return "https://www.google.com/maps?q="+s.lat+","+s.lng; }
function timePass(s){ const d=daysAgo(s); if(d<=3)return true;
  return state.win===7 && (s.rarity==="rare"||s.rarity==="very_rare") && d<=7; }
function visible(){ return state.data.map(s=>({...s,_d:haversine(state.user,s)}))
  .filter(timePass).filter(s=>state.maxDist===0||s._d<=state.maxDist)
  .filter(s=>state.active.has(s.rarity)).sort((a,b)=>a._d-b._d); }
function counts(){ const c={common:0,uncommon:0,rare:0,very_rare:0};
  state.data.forEach(s=>{ const d=haversine(state.user,s);
    if(timePass(s)&&(state.maxDist===0||d<=state.maxDist)) c[s.rarity]++; }); return c; }

/* ===== CHIPS ===== */
function renderChips(){
  const c=counts(), box=$("#chips"); box.innerHTML="";
  Object.keys(RARITY).sort((a,b)=>RARITY[b].o-RARITY[a].o).forEach(k=>{
    const r=RARITY[k], on=state.active.has(k);
    const el=document.createElement("button");
    el.className="chip"+(on?" on":""); el.style.setProperty("--pc",r.hex);
    el.innerHTML=`<span class="dot"></span>
      <svg class="ck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.6"><path d="M5 13l4 4L19 7"/></svg>
      ${r.label} <span class="n">${c[k]}</span>`;
    el.addEventListener("click",()=>{ on?state.active.delete(k):state.active.add(k); render(); });
    box.appendChild(el);
  });
}

/* ===== CARDS ===== */
function renderCards(){
  const items=visible(), box=$("#cards");
  $("#sumbig").textContent = items.length+" vogel"+(items.length===1?"":"s")+" in de buurt";
  $("#hint").textContent = state.win===7 ? "incl. zeldzaam t/m 7 dagen" : "";
  if(!items.length){
    box.innerHTML=`<div class="empty"><div class="e">🪹</div>
      <p><b>Niets gevonden.</b></p>
      <p>Probeer meer zeldzaamheden, vergroot de afstand, of schakel naar 7 dagen.</p></div>`;
    return;
  }
  box.innerHTML=items.map(s=>{
    const r=RARITY[s.rarity];
    const tag = s.rarity==="very_rare"?`<span class="mega">MEGA</span>`
             : s.rarity==="rare"?`<span class="rar">ZELDZAAM</span>`:"";
    const ph = s.photo?`<span class="ph">📷</span>`:"";
    const cnt = s.count>1?`· ×${s.count}`:"";
    const near = s._d<=10?`<span class="near">dichtbij</span>`:"";
    return `<div class="card${state.selected===s.id?" sel":""}" data-id="${s.id}" style="border-left-color:${r.hex}">
      <div class="cbody">
        <div class="cname"><b>${s.nl}</b> ${tag}<span class="en">${s.en||s.sci||""}</span></div>
        <div class="cmeta"><span class="w">📍 ${s.loc}</span> ${ph} <span>${ago(s)} ${cnt}</span></div>
      </div>
      <div class="cright"><div class="cdist">${fmtDist(s._d)}<small>van hier</small></div>${near}</div>
    </div>`;
  }).join("");
}

/* ===== STATUS ===== */
function renderStatus(){
  $("#locname").textContent = state.user.precise ? "jij" : state.user.name;
  let txt = "zeldzame vogels bij jou";
  if(state.lastUpdated){ const m=Math.round((Date.now()-state.lastUpdated)/6e4);
    txt = m<1?"zojuist bijgewerkt":m<60?`${m} min geleden bijgewerkt`:`${Math.round(m/60)} uur geleden bijgewerkt`; }
  if(state.isDemo) txt += " · demodata";
  $("#sub").textContent = txt;
}

/* ===== MAP ===== */
let map=null, markers={}, NL_BOUNDS=null;
function initMap(){
  map=L.map("map",{zoomControl:true,attributionControl:true,minZoom:6,maxZoom:16,
    maxBounds:[[49.5,1.5],[55.0,9.5]],maxBoundsViscosity:0.7}).setView([52.1,5.3],7);
  NL_BOUNDS=L.latLngBounds([[50.72,3.35],[53.55,7.24]]);
  map.fitBounds(NL_BOUNDS,{padding:[16,16]});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:"abcd", maxZoom:19
  }).addTo(map);
}
function makeIcon(s,sel){
  const r=RARITY[s.rarity];
  let size = s.rarity==="very_rare"?20:s.rarity==="rare"?18:s.rarity==="uncommon"?14:12;
  if(sel) size+=4;
  const cls="mk"+(s.rarity==="very_rare"?" mk-pulse":"")+(sel?" mk-sel":"");
  return L.divIcon({className:"",iconSize:[size,size],iconAnchor:[size/2,size/2],
    html:`<span class="${cls}" style="--c:${r.hex};width:${size}px;height:${size}px"></span>`});
}
function drawMarkers(){
  if(!map) return;
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
  markers["__user"]=L.marker([state.user.lat,state.user.lng],{
    icon:L.divIcon({className:"",iconSize:[20,20],iconAnchor:[10,10],html:'<span class="me"></span>'}),
    zIndexOffset:1000}).addTo(map);
  visible().forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s,state.selected===s.id)}).addTo(map);
    m.bindPopup(`<div class="pop">
      <div class="pnl">${s.nl} ${s.count>1?`<small>×${s.count}</small>`:""}</div>
      <div class="pen">${s.en||s.sci||""}</div>
      <div class="pmeta">📍 ${s.loc}<br>${ago(s)} · ${fmtDist(haversine(state.user,s))} van hier</div>
      <div style="margin-top:6px"><a href="${mapsUrl(s)}" target="_blank" rel="noopener">Routebeschrijving</a> &nbsp;·&nbsp;
      <a href="${obsUrl(s)}" target="_blank" rel="noopener">waarneming.nl ↗</a></div></div>`);
    m.on("click",()=>{ state.selected=s.id; updateSel(); });
    markers[s.id]=m;
  });
}
function updateSel(){
  visible().forEach(s=>{ if(markers[s.id]) markers[s.id].setIcon(makeIcon(s,state.selected===s.id)); });
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("sel",c.dataset.id===state.selected));
  const sc=document.querySelector(".card.sel"); if(sc) sc.scrollIntoView({block:"nearest",behavior:"smooth"});
}
function selectFromCard(id){
  state.selected=id; updateSel();
  const s=state.data.find(x=>x.id===id);
  if(s&&map){ snapSheet(maxHidden,true); map.flyTo([s.lat,s.lng],13,{duration:.6});
    setTimeout(()=>markers[id]&&markers[id].openPopup(),250); }
}

/* ===== BOTTOM SHEET (drag + 3 snap points) ===== */
const sheet=$("#sheet"), handleEl=$("#handle"), headEl=$(".sheethead");
let sheetH=0, peek=120, midPeek=320, maxHidden=0, midHidden=0, curY=0, started=false, drag=null;
function measure(){
  sheetH=sheet.offsetHeight;
  peek=handleEl.offsetHeight+headEl.offsetHeight;                 // header only
  midPeek=Math.min(sheetH-40, peek+84);                          // header + just the first card (sneak preview)
  maxHidden=Math.max(0,sheetH-peek);
  midHidden=Math.max(0,sheetH-midPeek);
  if(!started){ curY=midHidden; started=true; }                  // default: sneak preview
  setSheet(curY,false);
}
function setSheet(y,anim){ curY=Math.max(0,Math.min(maxHidden,y));
  sheet.style.transition=anim?"transform .28s cubic-bezier(.32,.72,0,1)":"none";
  sheet.style.transform=`translateX(-50%) translateY(${curY}px)`; }
function snapSheet(target,anim){ setSheet(target,anim); }
function snapNearest(y){ return [0,midHidden,maxHidden].reduce((a,b)=>Math.abs(b-y)<Math.abs(a-y)?b:a); }
function toggleSheet(){ snapSheet(curY<4?midHidden:0,true); }     // full -> mid, otherwise -> full
handleEl.addEventListener("pointerdown",e=>{ drag={y:e.clientY,start:curY,moved:0}; handleEl.setPointerCapture(e.pointerId); sheet.style.transition="none"; });
handleEl.addEventListener("pointermove",e=>{ if(!drag)return; const dy=e.clientY-drag.y; drag.moved=Math.max(drag.moved,Math.abs(dy)); setSheet(drag.start+dy,false); });
handleEl.addEventListener("pointerup",e=>{ if(!drag)return; if(drag.moved<6) toggleSheet(); else snapSheet(snapNearest(curY),true); drag=null; });

/* ===== RENDER ===== */
function render(){ renderChips(); renderStatus(); renderCards(); drawMarkers(); }

/* ===== DATA ===== */
function loadDemo(){ state.data=DEMO.map(s=>({...s,date:dateFromDaysAgo(s.daysAgo)})); state.isDemo=true; state.lastUpdated=Date.now(); }
function buildUrl(){
  return CONFIG.DATA_URL
    .replaceAll("{lat}", state.user.lat.toFixed(5))
    .replaceAll("{lng}", state.user.lng.toFixed(5))
    .replaceAll("{radius}", String(CONFIG.FETCH_RADIUS_KM));
}
async function loadData(){
  if(!CONFIG.DATA_URL){ loadDemo(); render(); return; }
  $("#refresh").classList.add("spin");
  try{ const res=await fetch(buildUrl(),{cache:"no-store"}); if(!res.ok) throw 0;
    const j=await res.json(); state.data=(j.sightings||[]).filter(s=>s.lat&&s.lng&&s.rarity&&s.date);
    state.lastUpdated=j.lastUpdated?Date.parse(j.lastUpdated):Date.now(); state.isDemo=false;
  }catch(e){ loadDemo(); }
  $("#refresh").classList.remove("spin"); render();
}

/* ===== GEOLOCATION ===== */
function locate(){
  if(!navigator.geolocation){ render(); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ state.user={lat:p.coords.latitude,lng:p.coords.longitude,name:"you",precise:true};
      if(map) map.flyTo([state.user.lat,state.user.lng],10,{duration:.8});
      if(LOC_QUERY) loadData(); else render();         // refetch by GPS if the URL wants coordinates
    },
    ()=>render(), {enableHighAccuracy:true,timeout:8000,maximumAge:60000});
}

/* ===== WIRE UP ===== */
$("#win").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
  state.win=+b.dataset.w; $("#win").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); render(); }));
$("#dist").addEventListener("change",e=>{ state.maxDist=+e.target.value; render(); });
$("#refresh").addEventListener("click",loadData);
$("#loc").addEventListener("click",locate);
$("#cards").addEventListener("click",e=>{ const c=e.target.closest(".card"); if(c) selectFromCard(c.dataset.id); });

/* ===== GO ===== */
initMap();
loadData();
locate();
setTimeout(()=>{ map.invalidateSize(); if(NL_BOUNDS && !state.user.precise) map.fitBounds(NL_BOUNDS,{padding:[16,16]}); measure(); },120);
window.addEventListener("resize",()=>{ map.invalidateSize(); measure(); });
if(CONFIG.DATA_URL && CONFIG.AUTO_REFRESH_MIN>0) setInterval(loadData, CONFIG.AUTO_REFRESH_MIN*60000);
</script>
</body>
