<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Vogelradar — Statistieken</title>
<style>
  :root{ --brand:#0d9488; --brand-d:#0f766e; --ink:#0f172a; --muted:#64748b; --line:#e7ecf1; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f6f8fa;color:var(--ink)}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 70px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .top .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--brand),var(--brand-d))}
  .top h1{font-size:18px;margin:0;font-weight:760;letter-spacing:-.3px}
  .top a{margin-left:auto;font-size:13px;color:var(--brand-d);text-decoration:none;font-weight:600}

  .today{background:linear-gradient(145deg,var(--brand),var(--brand-d));color:#fff;border-radius:18px;
    padding:22px 22px 18px;box-shadow:0 8px 24px rgba(13,148,136,.25)}
  .today .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;opacity:.85;font-weight:700}
  .today .big{font-size:50px;font-weight:820;letter-spacing:-1.5px;line-height:1;margin:6px 0 2px}
  .today .big small{font-size:18px;font-weight:700;opacity:.9}
  .today .row{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap}
  .today .row b{display:block;font-size:20px;font-weight:780}
  .today .row span{opacity:.85;font-size:13px}

  h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:30px 0 12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
  .ranges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .ranges button{border:1.5px solid var(--line);background:#fff;color:var(--muted);font-weight:650;
    font-size:12.5px;padding:5px 11px;border-radius:999px;cursor:pointer;font-family:inherit}
  .ranges button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .selrow{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .selrow input{flex:1;min-width:160px;border:1.5px solid var(--line);border-radius:10px;padding:8px 11px;
    font-size:13.5px;font-family:inherit;outline:none}
  .selrow input:focus{border-color:var(--brand)}
  .selrow button{border:1.5px solid var(--line);background:#fff;color:var(--muted);font-weight:650;
    font-size:12.5px;padding:7px 12px;border-radius:10px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .chart-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .chart-title em{color:var(--brand-d);font-style:normal}

  svg.lc{width:100%;height:auto;display:block}
  .lc-x{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  th,td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{background:#f1f5f9;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:none}
  td.nm{font-weight:600;color:var(--ink)}
  tr.click{cursor:pointer}
  tr.click:hover{background:#f0fdfa}
  tr.click td.nm::after{content:'›';color:var(--brand);font-weight:800;margin-left:6px}
  .muted{color:var(--muted);font-size:13px}
  .err{color:#b91c1c;padding:20px;text-align:center}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"></div>
    <h1>Statistieken</h1>
    <a href="/">← naar de kaart</a>
  </div>

  <div id="today"></div>

  <h2>Verloop — unieke soorten per dag</h2>
  <div class="card">
    <div class="ranges" id="ranges"></div>
    <div class="selrow">
      <input id="gemsearch" list="gemlist" placeholder="Hele land — typ een gemeente om te filteren…" autocomplete="off">
      <datalist id="gemlist"></datalist>
      <button id="selreset" class="hidden">↺ Hele land</button>
    </div>
    <div class="chart-title" id="charttitle"></div>
    <div id="mainchart"></div>
    <div id="gebieden"></div>
  </div>

  <h2>Top 10 gemeentes · laatste 7 dagen</h2>
  <div id="gemeentes"></div>

  <h2>Top 10 gebieden · laatste 7 dagen</h2>
  <div id="hotspots"></div>
</div>

<script>
const MND=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const $=s=>document.getElementById(s);
function fmt(d){ const p=d.split('-'); return (+p[2])+' '+MND[(+p[1])-1]; }
function stripProv(n){ return (n||'').replace(/\s*\([A-Z]{2}\)\s*$/,''); }

function lineChart(series, color){
  if(!series || series.length<2)
    return '<p class="muted">De grafiek verschijnt zodra er een paar dagen aan geschiedenis is.</p>';
  const W=620,H=160,pad=22, c=color||'#0d9488';
  const max=Math.max(1,...series.map(s=>s.value)), n=series.length;
  const X=i=> pad+(i/(n-1))*(W-2*pad);
  const Y=v=> H-pad-(v/max)*(H-2*pad);
  const line=series.map((s,i)=>`${X(i).toFixed(1)},${Y(s.value).toFixed(1)}`).join(' ');
  const area=`${pad.toFixed(1)},${(H-pad).toFixed(1)} ${line} ${(W-pad).toFixed(1)},${(H-pad).toFixed(1)}`;
  return `<svg viewBox="0 0 ${W} ${H}" class="lc">
      <polygon points="${area}" fill="${c}" opacity="0.12"/>
      <polyline points="${line}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div class="lc-x"><span>${fmt(series[0].day)}</span><span>piek ${max}</span><span>${fmt(series[n-1].day)}</span></div>`;
}

function rankTable(items, label, nameFn, clickable){
  if(!items||!items.length) return '<p class="muted">Nog geen gegevens.</p>';
  return `<table>
    <tr><th>${label}</th><th>Soorten</th><th>Zeldzaam</th><th>Zeer zeldzaam</th></tr>
    ${items.map((a,i)=>`<tr class="${clickable?'click':''}" ${clickable?`onclick="selectGemeente('${(a.name||'').replace(/'/g,"\\'")}')"`:''}>
      <td class="nm">${i+1}. ${nameFn(a)}</td>
      <td><b>${a.unique_species}</b></td>
      <td>${a.rare}</td>
      <td>${a.very_rare}</td>
    </tr>`).join('')}
  </table>`;
}

let DAYS=[], GEMLIST=[], RANGE=30, SELGEM=null, SELGEM_HIST=[];

function renderMain(){
  const src = SELGEM ? SELGEM_HIST : DAYS;
  const series = (RANGE==='max') ? src : src.slice(-RANGE);
  $('charttitle').innerHTML = SELGEM ? `Toont: <em>${SELGEM}</em>` : 'Toont: <em>hele land</em>';
  $('mainchart').innerHTML = lineChart(series.map(d=>({day:d.day, value:d.unique_species})));
  document.querySelectorAll('#ranges button').forEach(b=>
    b.classList.toggle('on', String(b.dataset.r)===String(RANGE)));
}

const RANGES=[['7d',7],['30d',30],['6mnd',182],['1jr',365],['max','max']];
$('ranges').innerHTML = RANGES.map(([lbl,r])=>`<button data-r="${r}">${lbl}</button>`).join('');
$('ranges').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  RANGE = b.dataset.r==='max' ? 'max' : (+b.dataset.r); renderMain(); });

function selectGemeente(name){
  if(!name){ SELGEM=null; SELGEM_HIST=[]; $('gebieden').innerHTML=''; $('gemsearch').value='';
    $('selreset').classList.add('hidden'); renderMain(); return; }
  $('gemsearch').value=name;
  $('selreset').classList.remove('hidden');
  $('gebieden').innerHTML='<p class="muted">Laden…</p>';
  $('charttitle').scrollIntoView({behavior:'smooth',block:'nearest'});
  fetch('/stats/gemeente.json?name='+encodeURIComponent(name)).then(r=>r.json()).then(d=>{
    SELGEM=name; SELGEM_HIST=[...(d.history||[])];   // already chronological
    renderMain();
    $('gebieden').innerHTML = `<h2 style="margin:18px 0 8px">Gebieden in ${name} · laatste 7 dagen</h2>`
      + rankTable(d.hotspots,'Gebied',a=>stripProv(a.name),false);
  }).catch(()=>{ $('gebieden').innerHTML='<p class="err">Kon gemeente niet laden.</p>'; });
}
$('gemsearch').addEventListener('change',e=>{
  const v=e.target.value.trim();
  if(!v) selectGemeente(null);
  else if(GEMLIST.includes(v)) selectGemeente(v);
});
$('selreset').addEventListener('click',()=>selectGemeente(null));

fetch('/stats.json').then(r=>r.json()).then(j=>{
  DAYS=[...(j.days||[])].reverse();   // API newest-first → chronological
  GEMLIST=j.gemeente_list||[];
  $('gemlist').innerHTML = GEMLIST.map(g=>`<option value="${g}">`).join('');
  if(!DAYS.length){ $('today').innerHTML='<p class="err">Nog geen statistieken — komt na de eerste update.</p>'; return; }
  const t=DAYS[DAYS.length-1];
  $('today').innerHTML=`
    <div class="today">
      <div class="lbl">Vandaag gespot</div>
      <div class="big">${t.unique_species} <small>unieke soorten</small></div>
      <div class="row">
        <div><b>${t.total_sightings}</b><span>waarnemingen</span></div>
        <div><b>${t.rare}</b><span>zeldzaam</span></div>
        <div><b>${t.very_rare}</b><span>zeer zeldzaam</span></div>
      </div>
    </div>`;
  renderMain();
  $('gemeentes').innerHTML = rankTable(j.gemeentes, 'Gemeente', a=>a.name, true);
  $('hotspots').innerHTML  = rankTable(j.hotspots, 'Gebied', a=>stripProv(a.name), false);
}).catch(()=>{ $('today').innerHTML='<p class="err">Kon statistieken niet laden.</p>'; });
</script>
</body>
</html>
