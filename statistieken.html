<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Vogelradar — Statistieken</title>
<style>
  :root{ --brand:#0d9488; --brand-d:#0f766e; --ink:#0f172a; --muted:#64748b; --line:#e7ecf1; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f6f8fa;color:var(--ink)}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .top .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--brand),var(--brand-d))}
  .top h1{font-size:18px;margin:0;font-weight:760;letter-spacing:-.3px}
  .top a{margin-left:auto;font-size:13px;color:var(--brand-d);text-decoration:none;font-weight:600}

  .today{background:linear-gradient(145deg,var(--brand),var(--brand-d));color:#fff;border-radius:18px;
    padding:22px 22px 18px;box-shadow:0 8px 24px rgba(13,148,136,.25)}
  .today .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;opacity:.85;font-weight:700}
  .today .big{font-size:52px;font-weight:820;letter-spacing:-1.5px;line-height:1;margin:6px 0 2px}
  .today .big small{font-size:18px;font-weight:700;opacity:.9}
  .today .row{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap}
  .today .row div{font-size:13px}
  .today .row b{display:block;font-size:20px;font-weight:780}
  .today .row span{opacity:.85}

  h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:30px 0 12px}
  .chart{display:flex;align-items:flex-end;gap:4px;height:140px;padding:8px 4px;background:#fff;
    border:1px solid var(--line);border-radius:14px;overflow-x:auto}
  .bar{flex:1 0 14px;min-width:14px;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .bar i{width:100%;max-width:22px;background:var(--brand);border-radius:4px 4px 0 0;display:block;transition:height .3s}
  .bar i:hover{background:var(--brand-d)}
  .bar em{font-size:9px;color:var(--muted);font-style:normal;white-space:nowrap}

  table{width:100%;border-collapse:collapse;margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  th,td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{background:#f1f5f9;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:none}
  td.day{font-weight:600;color:var(--ink)}
  .muted{color:var(--muted)}
  .err{color:#b91c1c;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"></div>
    <h1>Statistieken</h1>
    <a href="/">← naar de kaart</a>
  </div>

  <div id="today"></div>

  <h2>Top 10 gemeentes · laatste 7 dagen</h2>
  <div id="gemeentes"></div>

  <h2>Top 10 gebieden · laatste 7 dagen</h2>
  <div id="hotspots"></div>

  <h2>Per provincie · laatste 7 dagen</h2>
  <div id="areas"></div>

  <h2>Laatste 30 dagen — unieke soorten per dag</h2>
  <div class="chart" id="chart"></div>

  <h2>Overzicht per dag</h2>
  <div id="table"></div>
</div>

<script>
const MND=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
function fmt(d){ const [y,m,da]=d.split('-'); return (+da)+' '+MND[(+m)-1]; }

fetch('/stats.json').then(r=>r.json()).then(j=>{
  const days=(j.days||[]);
  if(!days.length){ document.getElementById('today').innerHTML='<p class="err">Nog geen statistieken — komt na de eerste update.</p>'; return; }
  const t=days[0];
  document.getElementById('today').innerHTML=`
    <div class="today">
      <div class="lbl">Vandaag gespot</div>
      <div class="big">${t.unique_species} <small>unieke soorten</small></div>
      <div class="row">
        <div><b>${t.total_sightings}</b><span>waarnemingen</span></div>
        <div><b>${t.rare}</b><span>zeldzaam</span></div>
        <div><b>${t.very_rare}</b><span>zeer zeldzaam</span></div>
      </div>
    </div>`;

  function rankTable(items, label, nameFn){
    if(!items||!items.length) return '<p class="muted">Nog geen gegevens.</p>';
    return `<table>
      <tr><th>${label}</th><th>Soorten</th><th>Zeldzaam</th><th>Zeer zeldzaam</th></tr>
      ${items.map((a,i)=>`<tr>
        <td class="day">${i+1}. ${nameFn(a)}</td>
        <td><b>${a.unique_species}</b></td>
        <td>${a.rare}</td>
        <td>${a.very_rare}</td>
      </tr>`).join('')}
    </table>`;
  }
  const stripProv = n => (n||'').replace(/\s*\([A-Z]{2}\)\s*$/,'');
  document.getElementById('gemeentes').innerHTML = rankTable(j.gemeentes, 'Gemeente', a=>a.name);
  document.getElementById('hotspots').innerHTML  = rankTable(j.hotspots, 'Gebied', a=>stripProv(a.name));
  document.getElementById('areas').innerHTML     = rankTable(j.areas, 'Provincie', a=>a.area);

  const chrono=[...days].reverse();
  const max=Math.max(1,...chrono.map(d=>d.unique_species));
  document.getElementById('chart').innerHTML=chrono.map(d=>`
    <div class="bar" title="${fmt(d.day)}: ${d.unique_species} soorten">
      <i style="height:${Math.round(d.unique_species/max*100)}%"></i>
      <em>${(+d.day.split('-')[2])}</em>
    </div>`).join('');

  document.getElementById('table').innerHTML=`
    <table>
      <tr><th>Dag</th><th>Unieke soorten</th><th>Waarnemingen</th><th>Zeldzaam</th><th>Zeer zeldzaam</th></tr>
      ${days.map(d=>`<tr>
        <td class="day">${fmt(d.day)}</td>
        <td>${d.unique_species}</td>
        <td class="muted">${d.total_sightings}</td>
        <td>${d.rare}</td>
        <td>${d.very_rare}</td>
      </tr>`).join('')}
    </table>`;
}).catch(()=>{ document.getElementById('today').innerHTML='<p class="err">Kon statistieken niet laden.</p>'; });
</script>
</body>
</html>
